name: Monthly source re-verify

# Re-verifies guitarist → library amp connections once a month using the
# Claude API (web search), then pushes any new factual mappings to main.
# Requires repo secret ANTHROPIC_API_KEY. Manual run via "Run workflow".
on:
  schedule:
    - cron: '0 9 1 * *' # 09:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  reverify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Re-verify connections
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run reverify
      - name: Build (verify the data still compiles)
        run: npm run build
      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain src/data/guitarists.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/guitarists.json
            git commit -m "chore: monthly guitarist→library connection re-verify"
            git push
          else
            echo "No changes to push."
          fi
